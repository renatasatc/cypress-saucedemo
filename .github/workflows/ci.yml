name: Cypress Tests

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  cypress-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      #  FIX PRINCIPAL (garante Cypress instalado corretamente)
      - name: Instalar dependências
        run: npm ci

      #  Força instalação correta do Cypress binary
      - name: Instalar Cypress
        run: npx cypress verify

      #  Dependências Linux corretas
      - name: Instalar dependências do Linux
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk2.0-0 \
            libgtk-3-0 \
            libgbm-dev \
            libnotify-dev \
            libnss3 \
            libxss1 \
            libasound2t64

      # Rodar testes
      - name: Rodar testes Cypress
        run: npx cypress run
        continue-on-error: true

      #  Allure
      - name: Instalar Allure CLI
        run: npm install -g allure-commandline

      - name: Gerar relatório Allure
        if: always()
        run: allure generate allure-results --clean -o allure-report

      - name: Upload do relatório Allure
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report