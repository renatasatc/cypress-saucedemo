name: Cypress Tests

on:
  push:
    branches: [ main ]
  pull_request:

jobs:

  e2e-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências
        run: npm ci

      - name: Verificar Cypress
        run: npx cypress verify

      - name: Instalar dependências do Linux
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk2.0-0 \
            libgtk-3-0 \
            libgbm-dev \
            libnotify-dev \
            libnss3 \
            libxss1 \
            libasound2t64

      - name: Rodar testes E2E (UI)
        run: npx cypress run --spec "cypress/e2e/UI/**/*.cy.js"
        continue-on-error: true

      - name: Instalar Allure CLI
        run: npm install -g allure-commandline

      - name: Gerar resultados Allure E2E
        if: always()
        run: |
          mkdir -p allure-results-e2e
          cp -r allure-results/* allure-results-e2e || true

      - name: Upload resultados E2E
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-e2e
          path: allure-results-e2e


  api-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências
        run: npm ci

      - name: Verificar Cypress
        run: npx cypress verify

      - name: Rodar testes API
        run: npx cypress run --spec "cypress/e2e/api/**/*.cy.js"
        continue-on-error: true

      - name: Instalar Allure CLI
        run: npm install -g allure-commandline

      - name: Gerar resultados Allure API
        if: always()
        run: |
          mkdir -p allure-results-api
          cp -r allure-results/* allure-results-api || true

      - name: Upload resultados API
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-api
          path: allure-results-api


  publish-allure:
    needs: [e2e-tests, api-tests]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Download resultados E2E
        uses: actions/download-artifact@v4
        with:
          name: allure-results-e2e
          path: allure-results-e2e

      - name: Download resultados API
        uses: actions/download-artifact@v4
        with:
          name: allure-results-api
          path: allure-results-api

      - name: Merge dos resultados
        run: |
          mkdir -p allure-results
          cp -r allure-results-e2e/* allure-results || true
          cp -r allure-results-api/* allure-results || true

      - name: Instalar Allure CLI
        run: npm install -g allure-commandline

      - name: Gerar relatório final
        run: allure generate allure-results -o allure-report --clean

      - name: Publicar no GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report